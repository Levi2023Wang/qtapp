name: Build PyQt5 App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: python:3.8

    steps:

      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxrender1 \
            libsm6 \
            libfontconfig1 \
            libdbus-1-3 \
            libxcb-xinerama0

      - name: Install Python deps
        run: |
          pip install -U pip
          pip install PyQt5==5.15.4 pyinstaller==5.13.2

      - name: Build
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --windowed \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*
