runs-on: ubuntu-latest

container:
  image: ubuntu:20.04

steps:

  - uses: actions/checkout@v4

  - name: Install system packages
    run: |
      apt-get update

      DEBIAN_FRONTEND=noninteractive apt-get install -y \
        python3 \
        python3-pip \
        python3-dev \
        build-essential \
        libgl1 \
        libglib2.0-0 \
        libxkbcommon-x11-0 \
        libxrender1 \
        libsm6 \
        libfontconfig1 \
        libdbus-1-3 \
        libxcb-xinerama0

  - name: Install python deps
    run: |
      python3 -m pip install -U pip

      pip3 install \
        PyQt5==5.15.4 \
        pyinstaller==5.13.2

  - name: Build
    run: |
      pyinstaller \
        --clean \
        --onefile \
        --windowed \
        --name main \
        main.py

  - uses: actions/upload-artifact@v4
    with:
      name: linux-build
      path: dist/*
