jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:20.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.8 from deadsnakes
        run: |
          apt-get update
          apt-get install -y software-properties-common

          add-apt-repository ppa:deadsnakes/ppa -y
          apt-get update

          apt-get install -y \
            python3.8 \
            python3.8-dev \
            python3.8-distutils

          curl https://bootstrap.pypa.io/get-pip.py | python3.8

      - name: Install system deps
        run: |
          apt-get install -y \
            build-essential \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxrender1 \
            libsm6 \
            libfontconfig1 \
            libdbus-1-3 \
            libxcb-xinerama0

      - name: Install Python deps
        run: |
          python3.8 -m pip install -U pip
          pip3.8 install PyQt5==5.15.4 pyinstaller==5.13.2

      - name: Build
        run: |
          python3.8 -m PyInstaller \
            --clean \
            --onefile \
            --windowed \
            main.py

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*
